openapi: 3.0.0
info:
  title: Weather API
  version: 1.0.0
  description: API for retrieving weather data

servers:
  - url: https://api.weatherapi.com/v1

paths:
  /current:
    get:
      summary: Get current weather
      parameters:
        - name: city
          in: query
          required: true
          schema:
            type: string
        - name: apikey
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                city: Pune
                temperature: 30
                condition: Sunny

  /forecast:
    get:
      summary: Get weather forecast
      parameters:
        - name: city
          in: query
          required: true
          schema:
            type: string
        - name: days
          in: query
          required: true
          schema:
            type: integer
        - name: apikey
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response